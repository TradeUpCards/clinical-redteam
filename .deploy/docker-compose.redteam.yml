# Clinical Red Team Platform — droplet deployment.
#
# Sibling stack to the W2 AgentForge deployment (/opt/agentforge/). Both
# stacks attach to the same Docker network so this stack's daemon can
# reach the W2 agent at http://agent:8000 directly (no tunnel).
#
# Layout on the droplet:
#   /opt/redteam/.env                     # secrets + config (generated by bootstrap)
#   /opt/redteam/docker-compose.yml       # this file, copied by bootstrap
#   /opt/redteam/repo/                    # the clinical-redteam git checkout
#   /opt/redteam/evals/                   # bind-mounted artifact tree
#
# Two services:
#   redteam-daemon  — runs the continuous-mode attacker against agent:8000
#   redteam-status  — Flask app at port 8080, fronted by Caddy as
#                     https://redteam-142-93-242-40.nip.io
#
# Both bind-mount the same evals/ volume so status reads what daemon writes.

services:

  redteam-daemon:
    container_name: redteam-daemon
    # F9 V2 (Tate, 2026-05-13): restart: always → restart: on-failure:3
    #
    # Rationale: when the orchestrator halts INTENTIONALLY (cost cap,
    # signal collapse, target circuit open, HMAC misconfig, etc.) it
    # exits with code 0. `on-failure` only restarts on non-zero exit —
    # i.e. genuine Python crashes (uncaught exceptions, OOM kill). The
    # max-retries:3 cap means even repeated crashes give up after 3
    # attempts so we don't burn OpenRouter on a daemon that can't stay
    # up. Operator runs `docker compose start redteam-daemon` to resume
    # after an intentional halt.
    #
    # Previous `restart: always` caused a restart loop during the W2
    # Anthropic credit-balance outage on 2026-05-13 — each halt burned
    # one Red Team gen call before halting again.
    restart: on-failure:3
    build:
      context: ..              # repo root (this compose lives at .deploy/)
      dockerfile: .deploy/Dockerfile
    image: clinical-redteam:latest

    # Daemon mode: continuous loop against the W2 target. Cost cap is
    # the primary safety guard for unsupervised operation; iteration
    # cap is a secondary belt for safety. SIGINT (compose stop) halts
    # cleanly via the orchestrator's halt-on-signal path.
    command:
      - python
      - -m
      - clinical_redteam.run
      - --continuous
      - --max-budget
      - "5.00"
      - --max-iterations
      - "1000"
      - --halt-on-empty-categories

    environment:
      # Target reachable via Docker DNS (W2 agent service name on the
      # shared network). No tunnel, no public exposure of the target's
      # internal port.
      RED_TEAM_TARGET_URL: http://agent:8000
      RED_TEAM_TARGET_USER_ID: "1"
      RED_TEAM_TARGET_SENTINEL_PATIENT_IDS: "999100,999114,999050"

      # Secrets from /opt/redteam/.env (compose substitutes ${VAR} at
      # `docker compose up` time).
      RED_TEAM_TARGET_HMAC_SECRET: ${RED_TEAM_TARGET_HMAC_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}

      # Model routing per agent tier (names match openrouter.py:50-60).
      # Primary + comma-separated fallback list per tier. Fallback fires
      # on 429/5xx/connect/404.
      RED_TEAM_MODEL: ${RED_TEAM_MODEL:-deepseek/deepseek-chat}
      RED_TEAM_FALLBACK_MODELS: ${RED_TEAM_FALLBACK_MODELS:-meta-llama/llama-3.1-70b-instruct,anthropic/claude-haiku-4.5}
      JUDGE_MODEL: ${JUDGE_MODEL:-anthropic/claude-sonnet-4-5}
      JUDGE_FALLBACK_MODEL: ${JUDGE_FALLBACK_MODEL:-anthropic/claude-haiku-4.5}
      DOCUMENTATION_MODEL: ${DOCUMENTATION_MODEL:-anthropic/claude-haiku-4.5}
      DOCUMENTATION_FALLBACK_MODEL: ${DOCUMENTATION_FALLBACK_MODEL:-anthropic/claude-sonnet-4-5}

      # Cost guard. Daemon halts if cumulative session cost exceeds.
      # Compose-default conservative; raise via /opt/redteam/.env if
      # operator wants a longer unsupervised run.
      MAX_SESSION_COST_USD: ${MAX_SESSION_COST_USD:-5.00}

      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    volumes:
      # Scoped bind-mounts: only the writable output dirs are persisted
      # from host. Seeds + criteria stay from the image's COPY (read-only
      # at runtime; bind-mounting the whole evals/ tree would shadow them
      # with an empty host directory).
      #
      # Host dirs must be owned by uid 1000 (the redteam user inside the
      # container) — bootstrap.sh handles the chown before `compose up`.
      - /opt/redteam/evals/results:/app/evals/results
      - /opt/redteam/evals/vulnerabilities:/app/evals/vulnerabilities

    networks:
      # Default network for daemon ↔ status comms.
      - redteam-internal
      # External: the W2 AgentForge compose network so http://agent:8000
      # resolves. Name comes from the W2 compose project — confirm with
      # `docker network ls` on the droplet; usually `agentforge_default`.
      - agentforge_default

    # Daemon doesn't expose HTTP — health is process liveness.
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'clinical_redteam.run' >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redteam-status:
    container_name: redteam-status
    restart: always
    # Reuses the image built by `redteam-daemon`'s build directive (same
    # image:latest tag). Compose builds once, both services share.
    image: clinical-redteam:latest
    # Keep the build block here too so `docker compose build redteam-status`
    # alone (without daemon) works for local testing of the status app.
    build:
      context: ..
      dockerfile: .deploy/Dockerfile

    # Status app — Flask via gunicorn, port 8080.
    # Default CMD from the Dockerfile already runs gunicorn, so no
    # override needed here.
    environment:
      EVALS_DIR: /app/evals
      RESULTS_DIR: /app/evals/results
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Status app is read-only; no LLM keys or HMAC secret needed.

    volumes:
      # Same scoped mounts as daemon, but :ro for defense in depth — even
      # if the status app is compromised, it can't corrupt the artifact
      # tree. Status reads results + vulnerabilities, never writes.
      - /opt/redteam/evals/results:/app/evals/results:ro
      - /opt/redteam/evals/vulnerabilities:/app/evals/vulnerabilities:ro

    networks:
      - redteam-internal
      # Status app needs Caddy to reach it. Caddy lives on the W2
      # network. Attach status here so Caddy's reverse-proxy can find
      # `redteam-status:8080`.
      - agentforge_default

    # Caddy upstream health gate uses this.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Internal port only. Caddy does the TLS termination at 443.
    expose:
      - "8080"

networks:
  redteam-internal:
    driver: bridge

  # External network attached at runtime — created by the W2 compose,
  # we just reference it. Bootstrap verifies it exists before `up`.
  agentforge_default:
    external: true
